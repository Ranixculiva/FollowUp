<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#4a90e2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="description" data-i18n="app.description" data-i18n-attr="content" content="離線客戶管理與跟進系統">
    <meta name="i18n-title" content="app.title">
    <title>客戶管理系統</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/customer.css">
</head>
<body>
    <div class="container list-view">
        <div class="list-view-sticky" id="listViewSticky">
            <div class="search-container">
                <input type="text" class="search-bar" data-i18n="search.placeholder" data-i18n-attr="placeholder" placeholder="搜尋客戶...">
                <div class="locale-switch" role="group" aria-label="Language">
                    <button type="button" class="locale-switch-btn" data-set-locale="zh-TW" data-i18n="locale.zhTW" title="繁體中文">繁中</button>
                    <button type="button" class="locale-switch-btn" data-set-locale="en" data-i18n="locale.en" title="English">EN</button>
                </div>
                <button class="export-button" onclick="exportToJSON()" data-i18n="backup.export" data-i18n-attr="title" title="匯出備份">
                    <span class="material-icons">backup</span>
                </button>
                <button class="import-button" onclick="document.getElementById('fileInput').click()" data-i18n="backup.import" data-i18n-attr="title" title="匯入備份">
                    <span class="material-icons">restore</span>
                </button>
                <button class="report-open-button" onclick="showReportDialog()" data-i18n="report.open" data-i18n-attr="title" title="匯出報表">
                    <span class="material-icons">picture_as_pdf</span>
                </button>
                <input type="file" id="fileInput" class="file-input" accept=".json,.csv" onchange="handleFileImport(event)">
            </div>
        </div>
        <div id="customerList" class="customer-list"></div>
    </div>

    <div id="customerDetail" class="detail-view">
        <div class="form-header">
            <div class="form-buttons">
                <button class="ios-back-btn" onclick="handleBack()" data-i18n="form.back">返回</button>
                <div class="customer-title"></div>
                <button class="ios-save-btn" onclick="saveCustomer()" data-i18n="form.save">儲存</button>
                <button class="ios-delete-btn" onclick="handleDeleteCustomer()" data-i18n="form.delete">刪除</button>
            </div>
            <div class="form-tabs">
                <div class="form-tabs-container">
                    <div class="form-tab active" onclick="showTab('basic')" data-i18n="tabs.basic">基本資料</div>
                    <div class="form-tab" onclick="showTab('step2')" data-i18n="tabs.step2">Step 2</div>
                    <div class="form-tab" onclick="showTab('steam')" data-i18n="tabs.steam">STEAM評估</div>
                    <div class="form-tab" onclick="showTab('formhd')" data-i18n="tabs.formhd">FORMHD評估</div>
                    <div class="form-tab" onclick="showTab('evaluation')" data-i18n="tabs.evaluation">客戶評估</div>
                    <div class="form-tab" onclick="showTab('followup')" data-i18n="tabs.followup">跟進計劃</div>
                </div>
            </div>
        </div>

        <form id="customerForm">
            <!-- Form sections will be dynamically generated here -->
        </form>
    </div>

    <nav class="nav-bottom">
        <a href="#" class="nav-item" onclick="showCustomers()" data-i18n="nav.customers">客戶列表</a>
        <a href="#" class="nav-item" onclick="showAddCustomer()" data-i18n="nav.addCustomer">新增客戶</a>
        <a href="#" class="nav-item" onclick="showFollowUps()" data-i18n="nav.followUps">跟進計劃</a>
    </nav>

    <!-- Report Dialog -->
    <div id="reportDialog" class="dialog">
        <div class="dialog-content">
            <h2 data-i18n="report.title">選擇要匯出的客戶</h2>
            <label class="report-use-filter">
                <input type="checkbox" id="reportUseFilteredList" checked onchange="toggleReportFilteredMode()">
                <span data-i18n="report.useFilteredPrefix">使用目前列表篩選結果（</span><span id="reportFilteredCount">0</span><span data-i18n="report.customersUnit">位）</span>
            </label>
            <label class="report-select-all">
                <input type="checkbox" id="reportSelectAll" onchange="toggleReportSelectAll(this.checked)">
                <span data-i18n="report.selectAll">全選</span>
            </label>
            <div class="report-customer-list" id="reportCustomerList"></div>
            <div class="dialog-buttons">
                <button class="dialog-btn-primary" onclick="generatePdfReport()" data-i18n="report.exportPdf">匯出 PDF</button>
                <button class="dialog-btn-primary" onclick="generateReport()" data-i18n="report.print">列印</button>
                <button onclick="closeReportDialog()" data-i18n="report.cancel">取消</button>
            </div>
        </div>
    </div>

    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope:', registration.scope);
                    })
                    .catch(err => {
                        console.error('ServiceWorker registration failed:', err);
                    });
            });
        }
    </script>
    <script src="js/locales/bundled.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/db.js"></script>
    <script src="js/customer.js"></script>
    <script src="js/form-config.js"></script>
    <script src="js/form-i18n.js"></script>
    <script src="js/countries.js"></script>
    <script src="js/followup-sort.js"></script>
    <script src="js/form-generator.js"></script>
    <script src="js/report-builder.js"></script>
    <script src="js/vendor/html2pdf.bundle.min.js"></script>
    <script src="js/vendor/pdf-lib.min.js"></script>
    <script src="js/pdf-report.js"></script>
    <script src="js/backup.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
